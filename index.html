<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagem Especial</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .heart {
      position: fixed;
      bottom: -20px;
      color: #ff3860;
      font-size: 20px;
      animation: subir 4s linear infinite;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes subir {
      0% { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-120vh) scale(1.8); opacity: 0; }
    }

    .start {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    .dog-emoji {
      font-size: 80px;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: pulse 1.5s infinite ease-in-out;
      transition: transform .3s;
    }

    .dog-emoji:hover { transform: scale(1.1); }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .card {
      display: none;
      max-width: 90%;
      width: 380px;
      padding: 35px 25px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      animation: abrirCaixa 0.8s ease forwards;
      transform-origin: top;
    }

    @keyframes abrirCaixa {
      0% { transform: scaleY(0); opacity: 0; }
      100% { transform: scaleY(1); opacity: 1; }
    }

    h1 {
      color: #d14d72;
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: bold;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
      min-height: 35px;
      border-right: 2px solid #d14d72;
      width: fit-content;
      margin: 0 auto;
      white-space: nowrap;
      overflow: hidden;
    }

    p {
      font-size: 20px;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      margin-top: 20px;
      min-height: 50px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #d14d72;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .btn:hover {
      background: #b73b5e;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<script>
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.animationDuration = (3 + Math.random() * 2) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 400);

  document.addEventListener("click", (e) => {
    const boom = document.createElement("div");
    boom.classList.add("heart");
    boom.innerHTML = "💖";

    boom.style.left = e.clientX + "px";
    boom.style.top = e.clientY + "px";
    boom.style.position = "absolute";
    boom.style.animationDuration = (1 + Math.random()) + "s";
    boom.style.fontSize = (15 + Math.random() * 25) + "px";

    document.body.appendChild(boom);
    setTimeout(() => boom.remove(), 2000);
  });
</script>

<button id="startBtn" class="start">
  <span class="dog-emoji">🐶</span>
</button>

<div class="card">
  <h1 id="titulo"></h1>
  <button onclick="novaFrase()" class="btn">Nova frase</button>
  <p id="frase"></p>
</div>

<script>
  const frases = [
    "Você tem uma beleza que chama atenção sem nem tentar.",
    "Não estou te vendo, mas tenho certeza que você está muito linda.",
    "Se eu pudesse eu te comprava um lanche todo dia.",
    "É impossível não pensar em você durante o dia.",
    "Você tem um brilho que não dá pra ignorar.",
    "Falar com você sempre melhora meu humor.",
    "Você é diferentemente diferente de tudo (no bom sentido).",
    "Você tem um jeito tão único que é impossível não notar.",
    "Cada mensagem sua me faz pensar o quão interessante você é.",
    "Não sei o que você tem, mas sempre me faz sorrir.",
    "Sou fã de tudo que você faz.",
    "‘Vitória’ é conquista — e você é a mais linda que eu poderia ter.",
    "Eu poderia escrever mil códigos, mas nenhum explicaria o quanto você é incrível.",
    "Você merece algo que dá mais trabalho que uma mensagem no WhatsApp.",
    "Se eu fosse te definir com código: vitoria = infinito.",
    "Só criaria um site para uma pessoa: você."
  ];

  function novaFrase() {
    const escolhida = frases[Math.floor(Math.random() * frases.length)];
    document.getElementById('frase').innerText = escolhida;
  }

  function digitar(texto, elemento, velocidade = 70) {
    elemento.textContent = "";
    let i = 0;
    function escrever() {
      if (i < texto.length) {
        elemento.textContent += texto.charAt(i);
        i++;
        setTimeout(escrever, velocidade);
      }
    }
    escrever();
  }

  function coracoesExplodindoCentro() {
    for (let i = 0; i < 12; i++) {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";

      heart.style.left = "50vw";
      heart.style.top = "50vh";
      heart.style.position = "fixed";
      heart.style.animationDuration = (1 + Math.random()) + "s";
      heart.style.fontSize = (20 + Math.random() * 40) + "px";

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }
  }

  document.getElementById('startBtn').onclick = () => {
    const card = document.querySelector('.card');
    const titulo = document.getElementById('titulo');

    document.getElementById('startBtn').style.display = 'none';
    card.style.display = "block";

    card.style.animation = "none";
    void card.offsetWidth;
    card.style.animation = "abrirCaixa 0.8s ease forwards";

    setTimeout(() => coracoesExplodindoCentro(), 300);

    digitar("Oi Vitória ❤️", titulo, 160);
  };
</script>

</body>
</html>
